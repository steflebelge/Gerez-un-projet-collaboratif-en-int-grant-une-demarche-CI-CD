name: CD

on:
  push:
    branches: [ main ]

jobs:
  test-back:
    name: Tests Back-end
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'

      - name: Run tests
        run: mvn clean verify
        working-directory: back

  test-front:
    name: Tests Front-end
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm install
        working-directory: front

      - name: Run tests with coverage
        run: npx ng test --watch=false --code-coverage --browsers=ChromeHeadlessCI
        working-directory: front

  sonar-back:
    name: Analyse SonarCloud Back-end
    runs-on: ubuntu-latest
    needs: [ test-back ]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Run tests and generate coverage
        run: mvn clean verify
        working-directory: back

      - name: Analyse with SonarCloud
        run: |
          mvn sonar:sonar \
            -Dsonar.projectKey=steflebelge_Gerez-un-projet-collaboratif-en-int-grant-une-demarche-CI-CD \
            -Dsonar.organization=steflebelge \
            -Dsonar.host.url=https://sonarcloud.io \
            -Dsonar.coverage.jacoco.xmlReportPaths=target/site/jacoco/jacoco.xml \
            -Dsonar.qualitygate.wait=true
        working-directory: back
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  sonar-front:
    name: Analyse SonarCloud Front-end
    runs-on: ubuntu-latest
    needs: [ test-front ]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm install
        working-directory: front

      - name: Run tests with coverage
        run: npx ng test --watch=false --code-coverage --browsers=ChromeHeadlessCI
        working-directory: front

      - name: Debug SonarCloud project visibility
        run: |
          echo "=== Checking project via API ==="
          curl -s -o /dev/null -w "HTTP %{http_code}" \
            -u "${{ secrets.SONAR_TOKEN_FRONT }}:" \
            "https://sonarcloud.io/api/components/show?component=steflebelge_bobapp-front-angular"

      - name: Analyse with SonarCloud
        run: |
          npx sonarqube-scanner \
            -Dsonar.projectKey=steflebelge_bobapp-front-angular \
            -Dsonar.organization=steflebelge \
            -Dsonar.host.url=https://sonarcloud.io \
            -Dsonar.sources=src \
            -Dsonar.exclusions=**/*.spec.ts,node_modules/** \
            -Dsonar.tests=src \
            -Dsonar.test.inclusions=**/*.spec.ts \
            -Dsonar.javascript.lcov.reportPaths=coverage/bobapp/lcov.info \
            -Dsonar.login=${{ secrets.SONAR_TOKEN_FRONT }} \
            -Dsonar.qualitygate.wait=true
        working-directory: front

  docker-back:
    name: Build & Push Docker Back-end
    runs-on: ubuntu-latest
    needs: [ sonar-back ]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: back
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/bobapp-back:latest

  docker-front:
    name: Build & Push Docker Front-end
    runs-on: ubuntu-latest
    needs: [ sonar-front ]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: front
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/bobapp-front:latest
